global
    stats timeout 30s

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

frontend pg_reads
    bind *:5432
    default_backend postgres_slaves

backend postgres_slaves
    balance roundrobin
    option pgsql-check user myuser
    server slave1 pg-slave-1:5432 check
    server slave2 pg-slave-2:5432 check

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
