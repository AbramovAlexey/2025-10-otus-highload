spring:
  datasource:
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/liquibase-changelog.xml
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        concurrency: 3
        max-concurrency: 6
rabbit:
  celebrity-queue:
    batchSize: 50
    batchTimeOut: 10000
grpc:
  client:
    dialog-service:
      negotiation-type: plaintext
management:
  tracing:
    baggage:
      remote-fields:
        - x-request-id
      correlation:
        fields:
          - x-request-id
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5p [%X{traceId:-}, %X{x-request-id:-}] %c{1}:%L - %m%n"