events { worker_connections 1024; }

http {
    upstream my_apps {
        server app-1:8080;
        server app-2:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://my_apps;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

}
